<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试深蓝色背景</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #1a2f6c;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .card {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            margin-top: 0;
            color: #ffffff;
        }
        
        p {
            margin-bottom: 25px;
            font-size: 18px;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(45deg, #3a7bd5, #00d2ff);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            margin-top: 20px;
        }
        
        .color-box {
            width: 100px;
            height: 100px;
            background-color: #1a2f6c;
            margin: 20px auto;
            border: 2px solid white;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>深蓝色背景测试</h1>
        <p>这个页面使用了纯深蓝色背景 #1a2f6c</p>
        
        <div class="color-box"></div>
        
        <p>背景颜色应该和下面的方块颜色一致</p>
        
        <p><strong>时间戳:</strong> <span id="timestamp"></span></p>
        
        <a href="auth-test.html" class="btn">返回测试页面</a>
    </div>

    <script>
        // 显示当前时间戳，确认这是新页面
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
    </script>
</body>
</html>

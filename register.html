<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Open Graph 和 社交媒体标签 -->

    <!-- 字体和图标 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/3b5ee8c66b.js" crossorigin="anonymous"></script>
    
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #1a2f6c !important;
            background-color: #1a2f6c !important;
            background-image: none !important;
            background-attachment: fixed;
            min-height: 100vh;
            color: #ffffff;
        }
        
        /* 导航栏样式 */
        header {
            background-color: transparent !important;
            position: relative !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        header .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
            display: flex;
            justify-content: space-between; /* 修改为两侧分布 */
            align-items: center;
        }
        
        .navbar {
            display: flex !important;
            justify-content: space-between !important; /* 修改为两侧分布 */
            align-items: center !important;
            padding: 10px 0 !important;
            background-color: transparent !important;
            position: static !important;
            width: 100% !important;
        }
        
        .logo {
            color: #fff !important;
            text-decoration: none !important;
        }
        
        .logo h1 {
            font-size: 1.5rem !important;
            font-weight: bold !important;
            margin: 0 !important;
        }
        
        .nav-menu {
            display: flex !important;
            margin: 0 !important;
            padding: 0 !important;
            list-style: none !important;
        }
        
        .nav-menu li {
            margin: 0 1.5rem !important;
        }
        
        .nav-menu a {
            color: #fff !important;
            text-decoration: none !important;
            font-size: 1rem !important;
            font-weight: normal !important;
            padding: 0.8rem 0 !important;
            display: inline-block !important;
            position: relative !important;
        }
        
        .nav-menu a.active {
            color: #00d2ff !important;
            position: relative !important;
        }
        
        .nav-menu a.active::after {
            content: '' !important;
            position: absolute !important;
            left: 0 !important;
            bottom: 0 !important;
            width: 100% !important;
            height: 2px !important;
            background-color: #00d2ff !important;
        }
        
        .nav-menu a::after {
            content: '' !important;
            position: absolute !important;
            left: 0 !important;
            bottom: 0 !important;
            width: 100% !important;
            height: 2px !important;
            background-color: #fff !important;
            transform: scaleX(0) !important;
            transition: transform 0.3s ease !important;
        }
        
        .nav-menu a:hover::after {
            transform: scaleX(1) !important;
        }
        
        /* 汉堡菜单 */
        .hamburger {
            display: none;
            cursor: pointer;
        }
        
        .bar {
            display: block;
            width: 25px;
            height: 3px;
            margin: 5px auto;
            transition: all 0.3s ease;
            background-color: #fff;
        }
        
        .hamburger.active .bar:nth-child(2) {
            opacity: 0;
        }
        
        .hamburger.active .bar:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        
        .hamburger.active .bar:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }
        
        /* 身份验证容器 */
        .auth-container {
            display: flex;
            max-width: 1000px;
            margin: 5rem auto 2rem;
            min-height: calc(100vh - 300px);
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .auth-card {
            flex: 1;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            background-color: rgba(24, 42, 70, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .auth-info {
            flex: 1;
            padding: 2.5rem;
            background: linear-gradient(135deg, #2a3f8c, #1a2f6c);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* 表单标题 */
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        
        .auth-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }
        
        /* 表单元素 */
        .auth-form {
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3a7bd5;
            background-color: rgba(255, 255, 255, 0.12);
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        /* 按钮样式 */
        .btn-primary {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(45deg, #3a7bd5, #00d2ff);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .btn-primary:hover {
            background: linear-gradient(45deg, #4a8be5, #10e2ff);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.2);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .full-width {
            width: 100%;
        }
        
        /* 分隔线 */
        .auth-divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.15);
        }
        
        .auth-divider span {
            padding: 0 1rem;
            font-size: 0.9rem;
        }
        
        /* 社交登录按钮 */
        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .btn-social {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.08);
            color: white;
            min-width: 120px;
        }
        
        .btn-social:hover {
            background-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }
        
        .btn-social i {
            margin-right: 0.5rem;
            font-size: 1.1rem;
        }
        
        .btn-social.weixin {
            background-color: rgba(7, 193, 96, 0.2);
            color: #fff;
            border: 1px solid rgba(7, 193, 96, 0.3);
        }
        
        .btn-social.weixin:hover {
            background-color: rgba(7, 193, 96, 0.3);
        }
        
        .btn-social.weibo {
            background-color: rgba(230, 22, 45, 0.2);
            color: #fff;
            border: 1px solid rgba(230, 22, 45, 0.3);
        }
        
        .btn-social.weibo:hover {
            background-color: rgba(230, 22, 45, 0.3);
        }
        
        .btn-social.xiaohongshu {
            background-color: rgba(255, 50, 50, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 50, 50, 0.3);
        }
        
        .btn-social.xiaohongshu:hover {
            background-color: rgba(255, 50, 50, 0.3);
        }
        
        /* 页脚 */
        .auth-footer {
            margin-top: auto;
            text-align: center;
            padding-top: 1rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .auth-footer a {
            color: #3a7bd5;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .auth-footer a:hover {
            color: #00d2ff;
        }
        
        /* 信息栏 */
        .auth-info h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: white;
            font-weight: 600;
        }
        
        .auth-info p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .auth-info ul {
            list-style: none;
            padding: 0;
        }
        
        .auth-info ul li {
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .auth-info ul li i {
            margin-right: 1rem;
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
            color: #00d2ff;
        }
        
        /* 验证码按钮 */
        .verification-code-group {
            display: flex;
            gap: 10px;
        }
        
        .btn-verification-code {
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #ffffff;
            cursor: pointer;
            white-space: nowrap;
        }
        
        /* 响应式设计 */
        @media (max-width: 992px) {
            .auth-container {
                flex-direction: column;
                max-width: 600px;
            }
            
            .auth-info {
                order: -1;
                padding: 2rem;
            }
            
            .auth-card {
                border-right: none;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }
        }
        
        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }
            
            .nav-menu {
                position: fixed;
                left: -100%;
                top: 70px;
                flex-direction: column;
                background-color: rgba(0, 0, 0, 0.9);
                width: 100%;
                text-align: center;
                transition: 0.3s;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
                padding: 2rem 0;
                z-index: 100;
            }
            
            .nav-menu.active {
                left: 0;
            }
            
            .nav-menu li {
                margin: 1.5rem 0;
            }
            
            .auth-container {
                margin-top: 4rem;
            }
            
            .social-login {
                flex-direction: column;
            }
            
            .btn-social {
                margin-bottom: 0.8rem;
            }
        }
        
        @media (max-width: 480px) {
            .auth-container {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            .auth-card {
                padding: 1.5rem;
            }
            
            .auth-header h1 {
                font-size: 1.8rem;
            }
            
            .form-group input {
                padding: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="main-header">
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <h1>NexusOrbital</h1>
                </a>
                <div class="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
                <ul class="nav-menu">
                    <li><a href="about.html">关于我们</a></li>
                    <li><a href="community.html" class="active">共创社区</a></li>
                    <li><a href="design-studio.html">AI设计工坊</a></li>
                    <li><a href="marketplace.html">众筹商城</a></li>
                    <li><a href="agents.html">智能体系统</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <!-- 主要内容 -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>创建账户</h1>
                <p>开始您的太空探索之旅</p>
            </div>
            
            <form class="auth-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="请输入您的用户名">
                </div>
                
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" placeholder="请输入您的邮箱">
                </div>
                
                <div class="form-group">
                    <label for="phone">手机号</label>
                    <input type="tel" id="phone" placeholder="请输入您的手机号">
                </div>
                
                <div class="form-group">
                    <label for="sms-code">验证码</label>
                    <div class="verification-code-group">
                        <input type="text" id="sms-code" placeholder="请输入验证码" style="flex: 1;">
                        <button type="button" class="btn-verification-code">获取验证码</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">设置密码</label>
                    <input type="password" id="password" placeholder="请设置您的密码">
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">确认密码</label>
                    <input type="password" id="confirm-password" placeholder="请再次输入密码">
                </div>
                
                <div class="form-group" style="display: flex; align-items: center;">
                    <input type="checkbox" id="terms" style="width: auto; margin-right: 10px;">
                    <label for="terms" style="margin-bottom: 0;">我已阅读并同意 <a href="#" style="color: #3a7bd5; text-decoration: none;">用户协议</a> 和 <a href="#" style="color: #3a7bd5; text-decoration: none;">隐私政策</a></label>
                </div>
                
                <button type="button" class="btn-primary full-width">立即注册</button>
                
                <div class="auth-divider">
                    <span>或通过以下方式注册</span>
                </div>
                
                <div class="social-login">
                    <button type="button" class="btn-social weixin">
                        <i class="fab fa-weixin"></i> 微信注册
                    </button>
                    <button type="button" class="btn-social weibo">
                        <i class="fab fa-weibo"></i> 微博注册
                    </button>
                    <button type="button" class="btn-social xiaohongshu">
                        <i class="fas fa-book"></i> 小红书注册
                    </button>
                </div>
            </form>
            
            <div class="auth-footer">
                已有账户? <a href="login.html">立即登录</a>
            </div>
        </div>
        
        <div class="auth-info">
            <h2>加入NexusOrbital社区</h2>
            <p>成为NexusOrbital社区的一员，您将获得：</p>
            <ul>
                <li><i class="fas fa-rocket"></i> 与全球太空探索爱好者交流的机会</li>
                <li><i class="fas fa-robot"></i> AI设计助手的专业支持</li>
                <li><i class="fas fa-globe-asia"></i> 参与全球太空探索交流社区</li>
                <li><i class="fas fa-shield-alt"></i> 虚拟天文台专属权限</li>
                <li><i class="fas fa-puzzle-piece"></i> 不断完善的太空主题内容</li>
            </ul>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 添加cache-busting参数到所有链接
            const timestamp = new Date().getTime();
            const links = document.querySelectorAll('a[href]');
            
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href.indexOf('?') === -1) {
                    link.setAttribute('href', href + '?v=' + timestamp);
                } else {
                    link.setAttribute('href', href + '&v=' + timestamp);
                }
            });
            
            // 切换标签功能
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabId = this.getAttribute('data-tab');
                    
                    // 移除所有标签的活动状态
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    
                    // 添加当前标签的活动状态
                    this.classList.add('active');
                    document.getElementById(tabId).classList.add('active');
                });
            });
            
            // 移动端菜单功能
            const hamburger = document.querySelector(".hamburger");
            const navMenu = document.querySelector(".nav-menu");
            
            if (hamburger && navMenu) {
                hamburger.addEventListener("click", function() {
                    hamburger.classList.toggle("active");
                    navMenu.classList.toggle("active");
                });
                
                // 点击导航链接时关闭菜单
                document.querySelectorAll(".nav-menu a").forEach(link => {
                    link.addEventListener("click", function() {
                        hamburger.classList.remove("active");
                        navMenu.classList.remove("active");
                    });
                });
            }
        });
    </script>
</body>
